# This is a Databricks asset bundle definition for harshita_dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: harshita_dab_project
  uuid: 67f5c230-5c4f-4308-a1e0-ba3ea59cb913

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  catalog_name:
    default: 'main'
  catalog:
    default: 'main'
  schema:
    default: 'default'

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/documentation-modes.html.
    mode: development
    default: true
    presets:
      source_linked_deployment: false 
    workspace:
      host: https://dbc-42965744-8e47.cloud.databricks.com/
    variables:
      catalog: ${var.catalog_name}
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-42965744-8e47.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/harshitagupta.azure@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/harshitagupta.azure@gmail.com/PROD/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ${var.catalog_name}
      schema: prod
    permissions:
      - group_name: admins
        level: CAN_MANAGE
